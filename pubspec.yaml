    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
